services:
  - type: web
    name: seclog-dashboard-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ADMIN_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
